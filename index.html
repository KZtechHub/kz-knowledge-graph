<style>
/* ===================== RESET & BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep:    #050810;
  --bg-panel:   rgba(5, 8, 20, 0.95);
  --accent:     #4a9eff;
  --accent2:    #7850ff;
  --text-main:  #e0e6ff;
  --text-dim:   rgba(160, 190, 255, 0.7);
  --border:     rgba(74, 158, 255, 0.3);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-main);
  font-family: 'Space Mono', monospace;
  cursor: crosshair;
}

/* ===================== STARFIELD ===================== */
#starfield {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 40%, #0d1a3a 0%, #050810 65%),
    radial-gradient(ellipse at 80% 70%, #0a0f2a 0%, transparent 60%);
}

/* Procedural stars via CSS */
#starfield::before, #starfield::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at  8%  12%, rgba(255,255,255,0.90) 0%, transparent 100%),
    radial-gradient(1px 1px at 18%  65%, rgba(255,255,255,0.70) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 28%  28%, rgba(180,210,255,0.95) 0%, transparent 100%),
    radial-gradient(1px 1px at 38%  82%, rgba(255,255,255,0.60) 0%, transparent 100%),
    radial-gradient(1px 1px at 48%   5%, rgba(255,255,255,0.80) 0%, transparent 100%),
    radial-gradient(1px 1px at 58%  48%, rgba(200,230,255,0.75) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 68%  91%, rgba(255,255,255,0.85) 0%, transparent 100%),
    radial-gradient(1px 1px at 78%  33%, rgba(255,255,255,0.65) 0%, transparent 100%),
    radial-gradient(1px 1px at 88%  72%, rgba(180,200,255,0.80) 0%, transparent 100%),
    radial-gradient(1px 1px at 95%  15%, rgba(255,255,255,0.55) 0%, transparent 100%);
}
#starfield::after {
  background-image:
    radial-gradient(1px 1px at  5%  45%, rgba(255,255,255,0.60) 0%, transparent 100%),
    radial-gradient(1px 1px at 22%  90%, rgba(200,220,255,0.70) 0%, transparent 100%),
    radial-gradient(1px 1px at 35%  55%, rgba(255,255,255,0.50) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 52%  30%, rgba(180,200,255,0.85) 0%, transparent 100%),
    radial-gradient(1px 1px at 65%   8%, rgba(255,255,255,0.75) 0%, transparent 100%),
    radial-gradient(1px 1px at 72%  62%, rgba(255,255,255,0.65) 0%, transparent 100%),
    radial-gradient(1px 1px at 82%  25%, rgba(200,230,255,0.70) 0%, transparent 100%),
    radial-gradient(1px 1px at 92%  88%, rgba(255,255,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 12%  38%, rgba(255,255,255,0.80) 0%, transparent 100%),
    radial-gradient(1px 1px at 42%  75%, rgba(180,210,255,0.60) 0%, transparent 100%);
  animation: twinkle 6s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0%   { opacity: 0.6; }
  50%  { opacity: 1.0; }
  100% { opacity: 0.7; }
}

/* ===================== CANVASES ===================== */
#graph2d, #graph3d {
  position: absolute; inset: 0; z-index: 1;
  width: 100%; height: 100%;
}

/* ===================== HUD PANEL ===================== */
.hud {
  position: absolute; top: 16px; left: 16px; z-index: 100;
  background: linear-gradient(135deg, rgba(5,8,20,0.96) 0%, rgba(10,20,52,0.92) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px 14px;
  width: 230px;
  box-shadow:
    0 0 40px rgba(60,100,255,0.12),
    inset 0 0 30px rgba(60,100,255,0.04),
    0 1px 0 rgba(255,255,255,0.05) inset;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.hud-brand {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(74,158,255,0.6);
  margin-bottom: 2px;
}

.hud-subtitle {
  font-size: 8px;
  color: rgba(160,190,255,0.5);
  letter-spacing: 1.5px;
  font-style: italic;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(74,158,255,0.15);
}

/* Stats bar */
.hud-stats {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.stat {
  flex: 1;
  text-align: center;
  background: rgba(74,158,255,0.06);
  border: 1px solid rgba(74,158,255,0.15);
  border-radius: 6px;
  padding: 5px 4px;
}
.stat-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  color: var(--accent);
  font-weight: 700;
}
.stat-key {
  font-size: 7px;
  color: rgba(160,190,255,0.5);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Toggle button */
#toggle3d {
  width: 100%; padding: 9px;
  background: linear-gradient(135deg, rgba(74,158,255,0.15), rgba(120,80,255,0.15));
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--accent);
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 14px;
  text-transform: uppercase;
}
#toggle3d:hover {
  background: linear-gradient(135deg, rgba(74,158,255,0.35), rgba(120,80,255,0.35));
  box-shadow: 0 0 20px rgba(74,158,255,0.25);
  transform: translateY(-1px);
}

/* Legend */
.legend-header {
  font-family: 'Orbitron', sans-serif;
  font-size: 7px;
  letter-spacing: 2.5px;
  color: rgba(100,140,255,0.45);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.legend-item {
  display: flex; align-items: center;
  margin-bottom: 4px;
}
.dot {
  width: 9px; height: 9px; border-radius: 50%;
  margin-right: 8px; flex-shrink: 0;
  box-shadow: 0 0 5px currentColor;
}
.legend-label {
  font-size: 9px;
  color: rgba(200,220,255,0.65);
  letter-spacing: 0.3px;
}

/* Credit line */
.hud-credit {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid rgba(74,158,255,0.1);
  font-size: 7.5px;
  color: rgba(100,140,255,0.35);
  letter-spacing: 1px;
  text-align: center;
}

/* ===================== INFO PANEL ===================== */
#info-panel {
  position: absolute; bottom: 24px; left: 16px; z-index: 100;
  background: linear-gradient(135deg, rgba(5,8,20,0.97), rgba(10,20,52,0.93));
  border: 1px solid rgba(74,158,255,0.25);
  border-radius: 12px;
  padding: 14px 18px;
  width: 290px;
  display: none;
  box-shadow: 0 0 30px rgba(60,100,255,0.12);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(12px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
#info-panel .info-icon {
  font-size: 22px;
  margin-bottom: 6px;
  display: block;
}
#info-panel h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 7px;
  letter-spacing: 1.5px;
  line-height: 1.4;
}
#info-panel p {
  font-size: 10px;
  color: rgba(200,220,255,0.82);
  line-height: 1.7;
  margin-bottom: 8px;
}
.tag {
  display: inline-block;
  padding: 2px 7px;
  background: rgba(74,158,255,0.1);
  border: 1px solid rgba(74,158,255,0.3);
  border-radius: 4px;
  font-size: 7.5px;
  color: var(--accent);
  margin: 2px 3px 2px 0;
  letter-spacing: 0.5px;
}
#close-info {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none;
  color: rgba(74,158,255,0.5); font-size: 16px;
  cursor: pointer; line-height: 1;
  transition: color 0.2s;
}
#close-info:hover { color: var(--accent); }

/* ===================== TOOLTIP ===================== */
#tooltip {
  position: absolute; z-index: 200;
  background: rgba(5,8,25,0.97);
  border: 1px solid rgba(74,158,255,0.4);
  border-radius: 8px;
  padding: 9px 13px;
  pointer-events: none;
  display: none;
  max-width: 210px;
  box-shadow: 0 0 25px rgba(74,158,255,0.18);
}
#tooltip b {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px; color: var(--accent);
  display: block; margin-bottom: 4px;
  letter-spacing: 1px;
}
#tooltip span {
  font-size: 9.5px;
  color: rgba(200,220,255,0.8);
  line-height: 1.6;
}

/* ===================== MODE BADGE ===================== */
#mode-badge {
  position: absolute; top: 16px; right: 16px; z-index: 100;
  font-family: 'Orbitron', sans-serif;
  font-size: 8px; letter-spacing: 3px;
  padding: 7px 14px; border-radius: 20px;
  background: rgba(74,158,255,0.08);
  border: 1px solid rgba(74,158,255,0.25);
  color: rgba(74,158,255,0.7);
  animation: badgePulse 3s ease-in-out infinite;
}
@keyframes badgePulse {
  0%, 100% { opacity: 0.6; box-shadow: 0 0 8px rgba(74,158,255,0.1); }
  50%       { opacity: 1.0; box-shadow: 0 0 20px rgba(74,158,255,0.25); }
}

/* ===================== HELP BADGE ===================== */
#help-badge {
  position: absolute; top: 56px; right: 16px; z-index: 100;
  font-size: 9px; letter-spacing: 0.5px;
  padding: 5px 12px; border-radius: 20px;
  background: rgba(5,8,20,0.8);
  border: 1px solid rgba(74,158,255,0.12);
  color: rgba(160,190,255,0.4);
}

/* ===================== WATERMARK ===================== */
.watermark {
  position: absolute; bottom: 14px; right: 16px; z-index: 100;
  font-family: 'Orbitron', sans-serif;
  font-size: 8px; letter-spacing: 3px;
  color: rgba(74,158,255,0.22);
  text-transform: uppercase;
  user-select: none;
}

/* ===================== RELATIONSHIP KEY ===================== */
#rel-key {
  position: absolute; bottom: 24px; right: 16px; z-index: 100;
  background: rgba(5,8,20,0.9);
  border: 1px solid rgba(74,158,255,0.15);
  border-radius: 10px;
  padding: 10px 14px;
  width: 175px;
  backdrop-filter: blur(10px);
}
.rel-key-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 7px; letter-spacing: 2px;
  color: rgba(100,140,255,0.4);
  margin-bottom: 8px; text-transform: uppercase;
}
.rel-item {
  display: flex; align-items: center;
  margin-bottom: 4px;
}
.rel-line {
  width: 28px; height: 2px;
  margin-right: 8px; flex-shrink: 0;
  border-radius: 1px;
}
.rel-label { font-size: 8.5px; color: rgba(200,220,255,0.55); }
</style>
</head>
<body>

<!-- Background -->
<div id="starfield"></div>

<!-- Graph Canvases -->
<svg id="graph2d"></svg>
<canvas id="graph3d" style="display:none"></canvas>

<!-- HUD Panel -->
<div class="hud">
  <div class="hud-brand">⚛ KIMIYYAR ZAHIRI</div>
  <div class="hud-subtitle">// Physical Science Universe v1.0</div>

  <div class="hud-stats">
    <div class="stat">
      <div class="stat-val" id="node-count">18</div>
      <div class="stat-key">Nodes</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="link-count">27</div>
      <div class="stat-key">Links</div>
    </div>

</div>

</div>

<!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
<script>
'use strict';

/* ============================================================
   1. GRAPH DATA
   ============================================================ */
const GRAPH_DATA = {
  nodes: [
    { id:"motion",      label:"Motion",               group:"insight",        score:5, summary:"Dokokin motsi — Newton's Laws of Motion. Tafiyar jikin da ke yanayin hanci da nau'o'in motsi daban-daban. The foundation of classical mechanics.", tags:["Physics","Newton","Kinematics"] },
    { id:"force",       label:"Force",                group:"active",         score:5, summary:"Karfi — Any interaction that changes an object's motion. Types: gravity, friction, tension, normal, applied. Vector quantity with magnitude and direction.", tags:["Mechanics","Vectors","Newton"] },
    { id:"energy",      label:"Energy",               group:"insight",        score:5, summary:"Makamashi — Ikon yin aiki. Conservation of energy: energy cannot be created or destroyed, only transformed. KE, PE, thermal, electrical.", tags:["Conservation","Work","Thermodynamics"] },
    { id:"heat",        label:"Heat & Temperature",   group:"active",         score:4, summary:"Zafi da zafin jiki — Thermal energy transfer via conduction, convection, and radiation. Thermodynamics laws govern heat engines and refrigerators.", tags:["Thermodynamics","Transfer","Entropy"] },
    { id:"light",       label:"Light & Optics",       group:"frontend",       score:4, summary:"Haske — Reflection, refraction, diffraction, and polarization. How mirrors, lenses, rainbows, and fiber optics work. Speed of light: 3×10⁸ m/s.", tags:["Optics","Waves","EM Spectrum"] },
    { id:"sound",       label:"Sound & Waves",        group:"frontend",       score:4, summary:"Sauti — Longitudinal mechanical waves. Frequency, amplitude, echo, Doppler effect. How we hear and why pitch changes with motion.", tags:["Acoustics","Vibration","Frequency"] },
    { id:"electricity", label:"Electricity",          group:"infrastructure", score:5, summary:"Lantarki — Electric charge, current, voltage, resistance. Ohm's Law: V=IR. Series and parallel circuits. The backbone of modern technology.", tags:["Circuits","Ohm's Law","DC/AC"] },
    { id:"magnetism",   label:"Magnetism",            group:"infrastructure", score:4, summary:"Maganadisu — Magnetic poles and fields. Electromagnetic induction (Faraday's Law). Motors, generators, and transformers all rely on this.", tags:["EM Induction","Fields","Faraday"] },
    { id:"matter",      label:"Matter & States",      group:"validation",     score:4, summary:"Abubuwan da ke tattare da duniya — Solid, liquid, gas, and plasma. Particle theory explains why matter behaves differently at different temperatures.", tags:["Particles","States","Phase Change"] },
    { id:"gravity",     label:"Gravity",              group:"insight",        score:5, summary:"Nauyi — Newton's universal law of gravitation: F=Gm₁m₂/r². Free fall, orbital motion, tides, and black holes all stem from this single force.", tags:["Newton","Space","Weight","Orbits"] },
    { id:"pressure",    label:"Pressure",             group:"active",         score:3, summary:"Matsi — Force per unit area (P=F/A). Pascal's principle, atmospheric pressure (101.3 kPa), Archimedes' buoyancy, and hydraulic systems.", tags:["Fluids","Pascal","Buoyancy"] },
    { id:"velocity",    label:"Velocity & Speed",     group:"active",         score:3, summary:"Gudun motsi — Scalar (speed) vs vector (velocity). Distance vs displacement. Equations of uniform acceleration apply in everyday motion.", tags:["Kinematics","Vectors","SUVAT"] },
    { id:"em_spectrum", label:"EM Spectrum",          group:"frontend",       score:3, summary:"Duk nau'o'in radiation — Radio → Microwave → Infrared → Visible → UV → X-ray → Gamma. All travel at the speed of light; differ only in frequency.", tags:["Radiation","Waves","Frequency"] },
    { id:"machines",    label:"Simple Machines",      group:"infrastructure", score:3, summary:"Na'urori masu sauƙi — Lever, pulley, inclined plane, wedge, screw, wheel and axle. Mechanical advantage: do more work with less force.", tags:["Work","Efficiency","Leverage"] },
    { id:"atoms",       label:"Atoms & Nuclei",       group:"validation",     score:4, summary:"Kwayoyin zarra — Proton, neutron, electron. Atomic number, mass number, isotopes. Radioactive decay: alpha, beta, gamma. Basis of nuclear energy.", tags:["Nuclear","Quantum","Structure","Isotopes"] },
    { id:"space",       label:"Space & Universe",     group:"insight",        score:4, summary:"Sararin samaniya — Planets, stars, black holes, galaxies. Our solar system spans ~9 light-hours. The observable universe spans ~93 billion light-years.", tags:["Astronomy","Cosmology","Solar System"] },
    { id:"environment", label:"Physics & Environment",group:"validation",     score:3, summary:"Yadda kimiyya ke shafar muhalli — Solar energy, greenhouse effect, climate physics. Renewable energy (solar, wind, hydro) relies on core physics principles.", tags:["Sustainability","Solar","Climate","Energy"] },
    { id:"measurement", label:"Measurement & SI Units",group:"archive",       score:3, summary:"Aunawa — International System of Units (SI). Significant figures, scientific notation, precision vs accuracy. The language of all scientific measurement.", tags:["SI","Laboratory","Standards","Data"] }
  ],
  links: [
    { source:"motion",      target:"force",       type:"requires"    },
    { source:"force",       target:"energy",      type:"leads_to"    },
    { source:"force",       target:"pressure",    type:"leads_to"    },
    { source:"force",       target:"gravity",     type:"relates_to"  },
    { source:"motion",      target:"velocity",    type:"builds_on"   },
    { source:"gravity",     target:"motion",      type:"leads_to"    },
    { source:"gravity",     target:"space",       type:"leads_to"    },
    { source:"energy",      target:"heat",        type:"leads_to"    },
    { source:"energy",      target:"electricity", type:"leads_to"    },
    { source:"energy",      target:"environment", type:"leads_to"    },
    { source:"electricity", target:"magnetism",   type:"leads_to"    },
    { source:"magnetism",   target:"electricity", type:"supports"    },
    { source:"electricity", target:"machines",    type:"supports"    },
    { source:"light",       target:"em_spectrum", type:"expands"     },
    { source:"light",       target:"sound",       type:"relates_to"  },
    { source:"em_spectrum", target:"atoms",       type:"relates_to"  },
    { source:"matter",      target:"atoms",       type:"builds_on"   },
    { source:"atoms",       target:"energy",      type:"relates_to"  },
    { source:"heat",        target:"matter",      type:"relates_to"  },
    { source:"pressure",    target:"matter",      type:"builds_on"   },
    { source:"machines",    target:"force",       type:"requires"    },
    { source:"measurement", target:"motion",      type:"supports"    },
    { source:"measurement", target:"force",       type:"supports"    },
    { source:"environment", target:"atoms",       type:"relates_to"  },
    { source:"space",       target:"em_spectrum", type:"relates_to"  },
    { source:"sound",       target:"measurement", type:"requires"    },
    { source:"matter",      target:"environment", type:"leads_to"    }
  ]
};

/* ============================================================
   2. STYLE MAPS
   ============================================================ */
const REL_STYLES = {
  relates_to:  { color:"#78909C", hex:0x78909C, dash:"5,4",  arrow:true,  strength:1, label:"Relates To"  },
  builds_on:   { color:"#00E676", hex:0x00E676, dash:"",     arrow:true,  strength:2, label:"Builds On"   },
  inspired_by: { color:"#FF9800", hex:0xFF9800, dash:"6,3",  arrow:true,  strength:1, label:"Inspired By" },
  requires:    { color:"#FF5252", hex:0xFF5252, dash:"",     arrow:true,  strength:3, label:"Requires"    },
  leads_to:    { color:"#40C4FF", hex:0x40C4FF, dash:"",     arrow:true,  strength:2, label:"Leads To"    },
  contradicts: { color:"#E91E63", hex:0xE91E63, dash:"2,5",  arrow:false, strength:1, label:"Contradicts" },
  supports:    { color:"#69F0AE", hex:0x69F0AE, dash:"",     arrow:true,  strength:2, label:"Supports"    },
  expands:     { color:"#E040FB", hex:0xE040FB, dash:"6,3",  arrow:true,  strength:1, label:"Expands"     }
};

const NODE_STYLES = {
  insight:        { color:"#1565C0", hex:0x1565C0, glow:"#1976D2", icon:"💡", label:"Insight"        },
  infrastructure: { color:"#2E7D32", hex:0x2E7D32, glow:"#388E3C", icon:"⚙️", label:"Infrastructure" },
  validation:     { color:"#F57F17", hex:0xF57F17, glow:"#F9A825", icon:"🛡️", label:"Validation"     },
  active:         { color:"#6A1B9A", hex:0x6A1B9A, glow:"#7B1FA2", icon:"⚡", label:"Active"         },
  frontend:       { color:"#01579B", hex:0x01579B, glow:"#0277BD", icon:"🌊", label:"Wave / Field"   },
  external:       { color:"#37474F", hex:0x37474F, glow:"#455A64", icon:"🌐", label:"External"       },
  archive:        { color:"#4E342E", hex:0x4E342E, glow:"#5D4037", icon:"📐", label:"Measurement"    }
};

/* ============================================================
   3. BUILD LEGEND + REL KEY
   ============================================================ */
const legendEl = document.getElementById("legend");
Object.entries(NODE_STYLES).forEach(([key, val]) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `
    <div class="dot" style="background:${val.color}; box-shadow:0 0 7px ${val.glow}"></div>
    <span class="legend-label">${val.icon} ${val.label}</span>`;
  legendEl.appendChild(item);
});

const relKeyEl = document.getElementById("rel-key");
Object.entries(REL_STYLES).forEach(([key, val]) => {
  const item = document.createElement("div");
  item.className = "rel-item";
  item.innerHTML = `
    <div class="rel-line" style="background:${val.color}; box-shadow:0 0 4px ${val.color}55"></div>
    <span class="rel-label">${val.label}</span>`;
  relKeyEl.appendChild(item);
});

/* ============================================================
   4. 2D D3 FORCE GRAPH
   ============================================================ */
const svg2d    = d3.select("#graph2d");
const container = svg2d.append("g");
let simulation;
let is3D = false;

function init2D(graph) {
  const W = window.innerWidth, H = window.innerHeight;
  svg2d.attr("width", W).attr("height", H);

  /* Zoom + Pan */
  svg2d.call(
    d3.zoom().scaleExtent([0.2, 5])
      .on("zoom", e => container.attr("transform", e.transform))
  );

  /* ── Defs ── */
  const defs = svg2d.append("defs");

  // Glow filter
  const filter = defs.append("filter").attr("id","glow")
    .attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
  filter.append("feGaussianBlur").attr("stdDeviation","4").attr("result","blur");
  const merge = filter.append("feMerge");
  merge.append("feMergeNode").attr("in","blur");
  merge.append("feMergeNode").attr("in","SourceGraphic");

  // Sharp glow
  const filter2 = defs.append("filter").attr("id","glowSharp")
    .attr("x","-30%").attr("y","-30%").attr("width","160%").attr("height","160%");
  filter2.append("feGaussianBlur").attr("stdDeviation","2").attr("result","blur2");
  const merge2 = filter2.append("feMerge");
  merge2.append("feMergeNode").attr("in","blur2");
  merge2.append("feMergeNode").attr("in","SourceGraphic");

  // Arrowhead markers
  Object.entries(REL_STYLES).forEach(([type, style]) => {
    defs.append("marker")
      .attr("id", `arrow-${type}`)
      .attr("viewBox","0 -5 10 10")
      .attr("refX", 24).attr("refY", 0)
      .attr("markerWidth", 4).attr("markerHeight", 4)
      .attr("orient","auto")
      .append("path").attr("d","M0,-5L10,0L0,5")
      .attr("fill", style.color).attr("opacity", 0.75);
  });

  /* ── Links ── */
  const linkSel = container.append("g").attr("class","links")
    .selectAll("line").data(graph.links).enter().append("line")
    .attr("stroke",         d => REL_STYLES[d.type]?.color   || "#555")
    .attr("stroke-width",   d => (REL_STYLES[d.type]?.strength || 1) * 1.3)
    .attr("stroke-dasharray",d => REL_STYLES[d.type]?.dash    || "")
    .attr("stroke-opacity", 0.45)
    .attr("marker-end",     d => REL_STYLES[d.type]?.arrow ? `url(#arrow-${d.type})` : null);

  /* ── Nodes ── */
  const nodeG = container.append("g").attr("class","nodes")
    .selectAll("g").data(graph.nodes).enter().append("g")
    .call(
      d3.drag()
        .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on("drag",  (e, d) => { d.fx=e.x; d.fy=e.y; })
        .on("end",   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  const r = d => 9 + (d.score || 1) * 2.8;

  // Outer glow ring
  nodeG.append("circle")
    .attr("r", d => r(d) + 7)
    .attr("fill","none")
    .attr("stroke", d => NODE_STYLES[d.group]?.glow || "#777")
    .attr("stroke-width", 1.5)
    .attr("opacity", 0.22)
    .attr("filter","url(#glow)");

  // Main body
  nodeG.append("circle")
    .attr("r", r)
    .attr("fill",   d => NODE_STYLES[d.group]?.color || "#444")
    .attr("stroke", d => NODE_STYLES[d.group]?.glow  || "#666")
    .attr("stroke-width", 1.8)
    .attr("filter","url(#glowSharp)")
    .style("cursor","pointer")
    .on("click",     (e, d) => { e.stopPropagation(); showInfo(d); })
    .on("mouseover", (e, d) => showTooltip(e, d))
    .on("mouseout",  hideTooltip);

  // Icon
  nodeG.append("text")
    .attr("text-anchor","middle").attr("dy","0.38em")
    .style("font-size","11px").style("pointer-events","none")
    .style("user-select","none")
    .text(d => NODE_STYLES[d.group]?.icon || "●");

  // Label
  nodeG.append("text")
    .attr("x", d => r(d) + 8).attr("y", 4)
    .attr("fill","rgba(200,225,255,0.8)")
    .style("font-size","10px")
    .style("font-family","Space Mono, monospace")
    .style("pointer-events","none")
    .text(d => d.label);

  /* ── Simulation ── */
  simulation = d3.forceSimulation(graph.nodes)
    .force("link",      d3.forceLink(graph.links).id(d => d.id).distance(185))
    .force("charge",    d3.forceManyBody().strength(-320))
    .force("center",    d3.forceCenter(W/2, H/2))
    .force("collision", d3.forceCollide(44))
    .on("tick", () => {
      linkSel
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeG.attr("transform", d => `translate(${d.x},${d.y})`);
    });

  // Close info when clicking canvas background
  svg2d.on("click", () => {
    document.getElementById("info-panel").style.display = "none";
  });
}

/* ── Info Panel ── */
function showInfo(d) {
  document.getElementById("info-icon").textContent    = NODE_STYLES[d.group]?.icon || "";
  document.getElementById("info-title").textContent   = d.label;
  document.getElementById("info-summary").textContent = d.summary || "No description available.";
  const tagsEl = document.getElementById("info-tags");
  tagsEl.innerHTML = "";
  (d.tags || []).forEach(t => {
    const s = document.createElement("span");
    s.className = "tag"; s.textContent = t;
    tagsEl.appendChild(s);
  });
  document.getElementById("info-panel").style.display = "block";
}
document.getElementById("close-info").addEventListener("click", () => {
  document.getElementById("info-panel").style.display = "none";
});

/* ── Tooltip ── */
function showTooltip(event, d) {
  document.getElementById("tip-title").textContent = `${NODE_STYLES[d.group]?.icon || ""} ${d.label}`;
  document.getElementById("tip-body").textContent  = (d.summary || "").substring(0,90) + "…";
  const tip = document.getElementById("tooltip");
  tip.style.display = "block";
  tip.style.left = (event.pageX + 14) + "px";
  tip.style.top  = (event.pageY - 14) + "px";
}
function hideTooltip() { document.getElementById("tooltip").style.display = "none"; }

/* ============================================================
   5. 3D THREE.JS GRAPH
   ============================================================ */
let scene, camera, renderer3d;
let nodeMeshes3d = [];
let mouseX = 0, mouseY = 0;
let rafId3d;

function init3D(graph) {
  const canvas = document.getElementById("graph3d");
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050810);
  scene.fog = new THREE.FogExp2(0x050810, 0.007);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 90);

  renderer3d = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer3d.setSize(window.innerWidth, window.innerHeight);
  renderer3d.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  /* Lighting */
  scene.add(new THREE.AmbientLight(0x1a2550, 3));
  const pLight = new THREE.PointLight(0x4a9eff, 4, 250);
  pLight.position.set(0, 20, 60);
  scene.add(pLight);
  const pLight2 = new THREE.PointLight(0x7850ff, 2, 200);
  pLight2.position.set(-40, -30, 30);
  scene.add(pLight2);

  /* Position nodes on Fibonacci sphere */
  const positions = {};
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  const R = 38;

  graph.nodes.forEach((n, i) => {
    const y   = 1 - (i / (graph.nodes.length - 1)) * 2;
    const rad = Math.sqrt(1 - y*y);
    const theta = goldenAngle * i;
    const pos = new THREE.Vector3(
      R * rad * Math.cos(theta),
      R * y,
      R * rad * Math.sin(theta)
    );
    positions[n.id] = pos;

    const radius  = 1.5 + (n.score||1) * 0.45;
    const geo     = new THREE.SphereGeometry(radius, 20, 20);
    const style   = NODE_STYLES[n.group] || NODE_STYLES.archive;
    const mat     = new THREE.MeshPhongMaterial({
      color:            new THREE.Color(style.color),
      emissive:         new THREE.Color(style.glow),
      emissiveIntensity:0.35,
      shininess:        90,
      specular:         new THREE.Color(0x223366)
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData = n;
    scene.add(mesh);
    nodeMeshes3d.push(mesh);
  });

  /* Edges */
  graph.links.forEach(l => {
    const srcId = typeof l.source === "object" ? l.source.id : l.source;
    const tgtId = typeof l.target === "object" ? l.target.id : l.target;
    const srcPos = positions[srcId];
    const tgtPos = positions[tgtId];
    if (!srcPos || !tgtPos) return;

    const style = REL_STYLES[l.type] || { hex:0x667788 };
    const mat   = new THREE.LineBasicMaterial({ color:style.hex, opacity:0.35, transparent:true });
    const geo   = new THREE.BufferGeometry().setFromPoints([srcPos, tgtPos]);
    scene.add(new THREE.Line(geo, mat));
  });

  /* Mouse parallax */
  window.addEventListener("mousemove", e => {
    mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  /* Animate */
  function animate() {
    rafId3d = requestAnimationFrame(animate);
    scene.rotation.y += 0.0018;
    scene.rotation.x += 0.0004;
    camera.position.x += (mouseX *  6 - camera.position.x) * 0.025;
    camera.position.y += (-mouseY * 4 - camera.position.y) * 0.025;
    camera.lookAt(scene.position);

    const t = Date.now() * 0.001;
    nodeMeshes3d.forEach((m, i) => {
      m.material.emissiveIntensity = 0.2 + Math.sin(t + i * 0.6) * 0.18;
    });
    renderer3d.render(scene, camera);
  }
  animate();
}

/* ============================================================
   6. TOGGLE 2D / 3D
   ============================================================ */
document.getElementById("toggle3d").addEventListener("click", () => {
  const canvas3 = document.getElementById("graph3d");
  const svg     = document.getElementById("graph2d");
  const badge   = document.getElementById("mode-badge");
  const helpBadge = document.getElementById("help-badge");
  is3D = !is3D;
  if (is3D) {
    canvas3.style.display = "block";
    svg.style.display = "none";
    badge.textContent = "◉ 3D MODE";
    helpBadge.textContent = "Move mouse to orbit · Auto-rotates";
    document.getElementById("rel-key").style.display = "block";
  } else {
    canvas3.style.display = "none";
    svg.style.display = "block";
    badge.textContent = "◉ 2D MODE";
    helpBadge.textContent = "Click nodes · Drag · Scroll to zoom";
  }
});

/* ============================================================
   7. RESIZE HANDLER
   ============================================================ */
window.addEventListener("resize", () => {
  const W = window.innerWidth, H = window.innerHeight;
  svg2d.attr("width", W).attr("height", H);
  if (simulation) simulation.force("center", d3.forceCenter(W/2, H/2)).alpha(0.1).restart();
  if (renderer3d) {
    renderer3d.setSize(W, H);
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
  }
});

/* ============================================================
   8. BOOT
   ============================================================ */
document.getElementById("node-count").textContent = GRAPH_DATA.nodes.length;
document.getElementById("link-count").textContent = GRAPH_DATA.links.length;

init2D(GRAPH_DATA);
init3D(GRAPH_DATA);
</script>
